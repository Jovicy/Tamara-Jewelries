<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./img/logo.jpeg">
    <!-- Link -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/queries.css">
    <!-- Title -->
    <title>Tamara & Fraser Jewelleries || Login Page</title>
</head>

<body>
    <section class="auth">
        <!-- Authentication image -->
        <div class="auth-image">
            <img src="./img/sign-in.png" alt="Authentication Image">
        </div>
        <!-- Login Form -->
        <div class="login-form">
            <div class="form-title">
                <h1>Sign In</h1>
                <p class="gold-text">WELCOME BACK TO TAMARA JEWELS</p>
            </div>
            <form action="#" method="post" class="main-form">
                <div class="auth-input">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" placeholder="tamara@fraser.com" required>
                </div>
                <div class="auth-input">
                    <label for="password">Password</label>
                    <input type="password" name="password" placeholder="1234*******" required>
                </div>
                <button type="submit" class="form-btn">Sign In</button>
            </form>
            <p>Don't have an account? <a href="signin.html">Sign Up</a></p>
        </div>
    </section>
</body>

</html>
