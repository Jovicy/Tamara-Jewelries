<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./img/logo.jpeg">
    <!-- Link -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/queries.css">
    <!-- Title -->
    <title>Tamara & Fraser Jewelleries || Sign Up Page</title>
</head>

<body>
    <section class="auth">
        <div class="auth-image">
            <img src="./img/sign-up.png" alt="Authentication Image">
        </div>

        <div class="login-form">
            <div class="form-title">
                <h1 class="auth-heading">
                    Join Us
                </h1>

                <p>
                    Join the Circle for early access to Bespoke collections, private viewings,
                    and artisan updates from our workshop.
                </p>
            </div>

            <form action="#" method="post" class="main-form">

                <!-- FULL NAME -->
                <div class="auth-input">
                    <label for="name">Full Name</label>
                    <input type="text" name="name" placeholder="Alexander Aurelian" required>
                </div>

                <!-- EMAIL -->
                <div class="auth-input">
                    <label for="email">email address</label>
                    <input type="email" name="email" placeholder="atelier@aurelian.com" required>
                </div>

                <!-- PASSWORD -->
                <div class="auth-input">
                    <label for="password">password</label>
                    <input type="password" name="password" placeholder="************" required>
                </div>

                <!-- CHECKBOX -->
                <div class="auth-check">
                    <input type="checkbox" id="updates">
                    <label for="updates">
                        I wish to receive information about Aurelian & Argent collections,
                        invitations to events, and personalized offers.
                    </label>
                </div>

                <!-- BUTTON -->
                <button type="submit" class="form-btn">CREATE ACCOUNT</button>

            </form>

            <p>Already have an account? <a href="login.html">Sign In</a></p>
        </div>
    </section>

</body>

</html>
